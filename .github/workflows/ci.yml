name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Unit Tests, Formatting, Lint, Types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Checkout Hermes Agent
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: _deps/hermes-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
            _deps/hermes-agent/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e _deps/hermes-agent
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: python -m pyrefly check --python-interpreter-path "$(which python)" --search-path _deps/hermes-agent --output-format=github

      - name: Unit tests
        env:
          HERMES_AGENT_PATH: ${{ github.workspace }}/_deps/hermes-agent
        run: python -m unittest test_meshtastic.py
